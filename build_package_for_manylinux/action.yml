name: "ManyLinux build"
description: "Build and upload package for ManyLinux systems"

inputs:
    python-version:
        description: 'Python version for installation'
        required: true

runs:
    using: "composite"
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v3
        with:
            submodules: 'true'

      - uses: MartinPdeS/MPSActions/interpret_python_version@master
        with:
          python-version: ${{ inputs.python-version }}

      - name: "Build: Wheels"
        uses: pypa/cibuildwheel@v2.16.2
        with:
            output-dir: dist
        env:
            CC: /usr/bin/gcc
            CXX: /usr/bin/g++
            CIBW_BUILD: "${{ env.PYTHON_CP_VERSION }}-manylinux_x86_64"
            CIBW_TEST_REQUIRES: ".[development]"
            CIBW_BUILD_VERBOSITY: 1
            CIBW_ARCHS: "x86_64"
            CIBW_MANYLINUX_X86_64_IMAGE: "manylinux2014"
            CIBW_TEST_COMMAND: 'pytest -s {project}/tests'
            CIBW_BEFORE_BUILD: |
                mkdir build
                cd build
                cmake -G"Unix Makefiles" -DPYBIND11_PYTHON_VERSION=${{ inputs.python-version }}  ./..
                make install
                cd ..
                ##### WTF: looks like if y put the requirement-dev before cmake install auditwheel will find too-recent symbols!!! (took me 8h to debug!)


      - name: "Upload: Wheel"
        uses: actions/upload-artifact@v3
        with:
            name: "manylinux_wheel_python${{ env.PYTHON_CP_VERSION }}"
            path: ./dist/*
