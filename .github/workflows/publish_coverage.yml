name: Build and Upload Package Coverage

on:
  workflow_call:
    inputs:
      python-version:
        required: true
        type: string
      apt-package:
        required: false
        type: string
  
    secrets:
      _GITHUB_TOKEN:
        required: true


jobs:
  coverage:
    name: Run test and generate coverage data
    runs-on: ubuntu-latest

    steps:
      - name: "Set-up: Python ${{ env.cp_python_version }}"
        uses: actions/setup-python@v5
        id: cp310
        with:
            python-version: ${{ inputs.python-version }}

      - name: "Install: apt-get dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ inputs.apt-package }}

      - name: "Checkout requirements and files for testing"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
    
      - name: Build wheel and install it with test dependencies
        run: |
          python -m pip install --upgrade pip wheel build
          python -m build --wheel
          python -m pip install --force-reinstall dist/*.whl
          python -m pip install pytest pytest-cov coverage
      
      - name: Run pytest with coverage
        run: |
          cd /tmp
          COVERAGE_FILE="${{ github.workspace }}/.coverage" \
          python -m pytest --import-mode=importlib --cov=PyMieSim --cov-config="${{ github.workspace }}/.coveragerc" "${{ github.workspace }}/tests" --config-file="${{ github.workspace }}/pytest.ini"
          python -m coverage xml -o "${{ github.workspace }}/coverage.xml"

      - name: Post coverage comment
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets._GITHUB_TOKEN }}
          MINIMUM_GREEN: 90
          MINIMUM_ORANGE: 50
          COVERAGE_PATH: .
