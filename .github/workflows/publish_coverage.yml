name: Build and Upload Package Coverage

on:
  workflow_call:
    inputs:
      python-version:
        required: true
        type: string
      apt-package:
        required: false
        type: string
  
    secrets:
      _GITHUB_TOKEN:
        required: true


jobs:
  coverage:
    name: Run test and generate coverage data
    runs-on: ubuntu-latest

    steps:
      - name: "Set-up: Python ${{ env.cp_python_version }}"
        uses: actions/setup-python@v5
        id: cp310
        with:
            python-version: ${{ inputs.python-version }}

      - name: "Install: apt-get dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ inputs.apt-package }}

      - name: "Checkout requirements and files for testing"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      # - name: Install everything, run the tests, produce the .coverage file
      #   run: |
      #     python -m pip install wheel build
      #     python -m build --wheel
      #     python -m pip install .[testing]
      
      - name: Build wheel and install it with test dependencies
        run: |
          python -m pip install --upgrade pip wheel build
          python -m build --wheel
          python -m pip install --force-reinstall dist/*.whl
          python -m pip install pytest pytest-cov coverage

      - name: Debug import resolution
        run: |
          python -c "import os, sys; print('cwd =', os.getcwd()); print('sys.path[0] =', sys.path[0])"
          python -c "import PyMieSim; print('PyMieSim =', PyMieSim.__file__)"
      
      - name: Run pytest with coverage
        run: |
          cd /tmp
          python -m pytest --import-mode=importlib "${{ github.workspace }}/tests" --config-file="${{ github.workspace }}/pytest.ini"
          python -m coverage xml -o "${{ github.workspace }}/coverage.xml"

      - name: Post coverage comment
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          coverage-file: coverage.xml
          GITHUB_TOKEN: ${{ secrets._GITHUB_TOKEN }}
          MINIMUM_GREEN: 90
          MINIMUM_ORANGE: 50
