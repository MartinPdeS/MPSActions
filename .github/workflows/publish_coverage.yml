name: Build and Upload Package Coverage

on:
  workflow_call:
    inputs:
      python-version:
        required: true
        type: string
      apt-package:
        required: false
        type: string
  
    secrets:
      _GITHUB_TOKEN:
        required: true


jobs:
  wheel-test:
    name: Build wheel and test installed package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install apt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ inputs.apt-package }}

      - name: Build wheel and test installed package
        run: |
          python -m pip install --upgrade pip wheel build
          python -m build --wheel
          python -m pip install --force-reinstall dist/*.whl
          python -m pip install pytest pytest-cov coverage
          cd /tmp
          python -m pytest --import-mode=importlib "${{ github.workspace }}/tests" --config-file="${{ github.workspace }}/pytest.ini"

  coverage-comment:
    name: Run source coverage and post comment
    runs-on: ubuntu-latest
    needs: wheel-test
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install apt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ inputs.apt-package }}

      - name: Install package in editable mode with test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[testing]

      - name: Run pytest with source coverage
        run: |
          python -m pytest \
            --import-mode=importlib \
            --cov=PyMieSim \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            tests \
            --config-file=pytest.ini

      - name: Post coverage comment
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets._GITHUB_TOKEN }}
          MINIMUM_GREEN: 90
          MINIMUM_ORANGE: 50
          COVERAGE_PATH: .
