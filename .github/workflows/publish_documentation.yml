name: Build and Upload Package Documentation on GitHub Pages

on:
  workflow_call:
    inputs:
      python-version:
        required: true
        type: string

      package-name:
        required: true
        type: string

      apt-package:
        required: false
        type: string
        default: ""

      source-ref:
        required: false
        type: string
        default: ""

      fail-on-sphinx-warning:
        required: false
        type: boolean
        default: false

concurrency:
  group: documentation-pages-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build_documentation:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    outputs:
      tag: ${{ steps.detect_documentation_version_tag.outputs.tag }}

    env:
      SOURCE_REF: ${{ inputs.source-ref }}
      CHECKOUT_REF: ${{ inputs.source-ref != '' && inputs.source-ref || github.ref }}
      PACKAGE_NAME: ${{ inputs.package-name }}
      PYTHON_VERSION: ${{ inputs.python-version }}
      APT_PACKAGE: ${{ inputs.apt-package }}
      DOCUMENTATION_BUILD_DIRECTORY: /tmp/documentation_build
      DOCUMENTATION_DOCTREE_DIRECTORY: /tmp/documentation_doctrees
      GENERATED_DOCUMENTATION_DIRECTORY: /tmp/generated_documentation_for_branch_update

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
          ref: ${{ env.CHECKOUT_REF }}

      - name: Debug source checkout
        run: |
          set -Eeuo pipefail

          echo "===== GitHub context ====="
          echo "repository:             ${{ github.repository }}"
          echo "event_name:             ${{ github.event_name }}"
          echo "workflow ref:           ${{ github.ref }}"
          echo "workflow ref name:      ${{ github.ref_name }}"
          echo "workflow ref type:      ${{ github.ref_type }}"
          echo "workflow sha:           ${{ github.sha }}"
          echo "source ref input:       ${SOURCE_REF}"
          echo "resolved checkout ref:  ${CHECKOUT_REF}"
          echo "package name:           ${PACKAGE_NAME}"
          echo "python version:         ${PYTHON_VERSION}"
          echo

          echo "===== source checkout ====="
          echo "pwd: $(pwd)"
          echo

          echo "current branch:"
          git branch --show-current || true
          echo

          echo "current commit:"
          git log -1 --decorate=full --oneline
          echo

          echo "all local and remote branches:"
          git branch --all --verbose --no-abbrev
          echo

          echo "recent commits:"
          git log --oneline --decorate --max-count=15
          echo

          echo "tags sorted by version:"
          git tag --sort=-v:refname | head -40 || true
          echo

          echo "tags pointing at HEAD:"
          git tag --points-at HEAD || true
          echo

          echo "nearest tag from git describe:"
          git describe --tags --abbrev=0 || true
          echo

          echo "source repository files, shallow sample:"
          find . -maxdepth 3 -type f | sort | sed 's|^\./||' | head -240

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Debug Python environment before install
        run: |
          set -Eeuo pipefail

          echo "===== Python executable ====="
          which python
          python --version
          echo

          echo "===== pip executable ====="
          python -m pip --version
          echo

          echo "===== Python platform ====="
          python - <<'PY'
          import platform
          import sys

          print(f"sys.executable: {sys.executable}")
          print(f"sys.version: {sys.version}")
          print(f"platform: {platform.platform()}")
          PY

      - name: Install headless dependencies
        run: |
          set -Eeuo pipefail

          sudo apt-get update

          if [ -n "${APT_PACKAGE}" ]; then
            echo "===== installing apt packages ====="
            echo "${APT_PACKAGE}"
            sudo apt-get install -y ${APT_PACKAGE}
          else
            echo "No extra apt packages requested."
          fi

      - name: Build package and install documentation dependencies
        run: |
          set -Eeuo pipefail

          echo "===== install build tools ====="
          python -m pip install --upgrade pip wheel build
          echo

          echo "===== build wheel ====="
          python -m build --wheel
          echo

          echo "===== built distributions ====="
          find dist -maxdepth 1 -type f -print | sort
          echo

          echo "===== install package with documentation extras ====="
          python -m pip install ".[documentation]"
          echo

          echo "===== installed package metadata ====="
          python -m pip show "${PACKAGE_NAME}" || true
          echo

          echo "===== installed documentation-related packages ====="
          python -m pip freeze | grep -Ei 'sphinx|docutils|myst|numpydoc|pydata|furo|gallery|design|matplotlib|plotly|jupyter|nbsphinx|myst-parser' || true

      - name: Detect documentation version tag
        id: detect_documentation_version_tag
        run: |
          set -Eeuo pipefail

          TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"

          if [ -z "${TAG}" ]; then
            TAG="0.0.0.0"
            echo "No Git tag was reachable from the source checkout. Falling back to ${TAG}."
          fi

          echo "tag=${TAG}" >> "${GITHUB_ENV}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

          echo "===== detected documentation version ====="
          echo "tag: ${TAG}"
          echo

          echo "===== tag diagnostics ====="
          echo "commit:"
          git rev-parse HEAD
          echo

          echo "nearest tag:"
          git describe --tags --abbrev=0 || true
          echo

          echo "exact tags on this commit:"
          git tag --points-at HEAD || true
          echo

          echo "tag object details:"
          git show --no-patch --decorate=full "${TAG}" || true
          echo

          echo "===== package version diagnostics ====="
          python - <<'PY'
          import importlib.metadata
          import os

          package_name = os.environ["PACKAGE_NAME"]

          try:
              version = importlib.metadata.version(package_name)
          except Exception as exception:
              print(f"Could not read installed package version for {package_name!r}: {exception}")
          else:
              print(f"Installed package version: {version}")
          PY

      - name: Build Sphinx documentation
        run: |
          set -Eeuo pipefail

          rm -rf "${DOCUMENTATION_BUILD_DIRECTORY}"
          rm -rf "${DOCUMENTATION_DOCTREE_DIRECTORY}"

          SPHINX_OPTIONS=(
            --verbose
            -b html
            -d "${DOCUMENTATION_DOCTREE_DIRECTORY}"
          )

          if [ "${{ inputs.fail-on-sphinx-warning }}" = "true" ]; then
            SPHINX_OPTIONS+=(
              -W
              --keep-going
            )
          fi

          echo "===== Sphinx command ====="
          printf 'sphinx-build %q ' "${SPHINX_OPTIONS[@]}"
          printf '%q ' "docs/source" "${DOCUMENTATION_BUILD_DIRECTORY}"
          echo
          echo

          sphinx-build \
            "${SPHINX_OPTIONS[@]}" \
            docs/source \
            "${DOCUMENTATION_BUILD_DIRECTORY}"

          echo
          echo "===== Sphinx output verification ====="
          test -d "${DOCUMENTATION_BUILD_DIRECTORY}"
          test -f "${DOCUMENTATION_BUILD_DIRECTORY}/index.html"

          echo "output directory:"
          echo "${DOCUMENTATION_BUILD_DIRECTORY}"
          echo

          echo "top-level directories:"
          find "${DOCUMENTATION_BUILD_DIRECTORY}" \
            -mindepth 1 \
            -maxdepth 1 \
            -type d \
            -printf "%f\n" \
            | sort || true
          echo

          echo "top-level files:"
          find "${DOCUMENTATION_BUILD_DIRECTORY}" \
            -maxdepth 1 \
            -type f \
            -printf "%f\n" \
            | sort || true
          echo

          echo "html file count:"
          find "${DOCUMENTATION_BUILD_DIRECTORY}" -type f -name "*.html" | wc -l
          echo

          echo "all file count:"
          find "${DOCUMENTATION_BUILD_DIRECTORY}" -type f | wc -l
          echo

          echo "build directory size:"
          du -sh "${DOCUMENTATION_BUILD_DIRECTORY}"
          echo

          echo "doctree directory size:"
          du -sh "${DOCUMENTATION_DOCTREE_DIRECTORY}" || true
          echo

          echo "all generated index.html files:"
          find "${DOCUMENTATION_BUILD_DIRECTORY}" \
            -type f \
            -name "index.html" \
            | sort || true
          echo

          echo "all generated html files, shallow sample:"
          find "${DOCUMENTATION_BUILD_DIRECTORY}" \
            -type f \
            -name "*.html" \
            | sort \
            | head -240 || true

      - name: Save generated documentation temporarily
        run: |
          set -Eeuo pipefail

          rm -rf "${GENERATED_DOCUMENTATION_DIRECTORY}"
          cp -a "${DOCUMENTATION_BUILD_DIRECTORY}" "${GENERATED_DOCUMENTATION_DIRECTORY}"

          echo "===== saved generated docs ====="
          test -f "${GENERATED_DOCUMENTATION_DIRECTORY}/index.html"
          echo

          echo "===== generated top-level directories ====="
          find "${GENERATED_DOCUMENTATION_DIRECTORY}" \
            -mindepth 1 \
            -maxdepth 1 \
            -type d \
            -printf "%f\n" \
            | sort || true
          echo

          echo "===== generated top-level files ====="
          find "${GENERATED_DOCUMENTATION_DIRECTORY}" \
            -maxdepth 1 \
            -type f \
            -printf "%f\n" \
            | sort || true
          echo

          echo "===== generated index.html files ====="
          find "${GENERATED_DOCUMENTATION_DIRECTORY}" \
            -type f \
            -name "index.html" \
            | sort || true
          echo

          echo "===== generated html files, shallow sample ====="
          find "${GENERATED_DOCUMENTATION_DIRECTORY}" \
            -type f \
            -name "*.html" \
            | sort \
            | head -240 || true
          echo

          echo "===== generated downloadable files, if any ====="
          if [ -d "${GENERATED_DOCUMENTATION_DIRECTORY}/_downloads" ]; then
            find "${GENERATED_DOCUMENTATION_DIRECTORY}/_downloads" \
              -type f \
              | sort || true
          else
            echo "No _downloads directory generated."
          fi
          echo

          echo "===== generated image files, if any ====="
          if [ -d "${GENERATED_DOCUMENTATION_DIRECTORY}/_images" ]; then
            find "${GENERATED_DOCUMENTATION_DIRECTORY}/_images" \
              -type f \
              | sort \
              | head -240 || true
          else
            echo "No _images directory generated."
          fi
          echo

          echo "===== generated documentation size ====="
          du -sh "${GENERATED_DOCUMENTATION_DIRECTORY}"

      - name: Upload generated documentation artifact for deploy job
        if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')) }}
        uses: actions/upload-artifact@v4
        with:
          name: generated-documentation
          path: ${{ env.GENERATED_DOCUMENTATION_DIRECTORY }}
          if-no-files-found: error
          retention-days: 1

  deploy_documentation:
    needs: build_documentation

    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')) }}

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    env:
      PACKAGE_NAME: ${{ inputs.package-name }}
      DOCUMENTATION_BRANCH: documentation_page
      GENERATED_DOCUMENTATION_DIRECTORY: /tmp/generated_documentation_for_branch_update
      PAGES_SITE_DIRECTORY: /tmp/pages_site
      tag: ${{ needs.build_documentation.outputs.tag }}

    steps:
      - name: Download generated documentation artifact
        uses: actions/download-artifact@v4
        with:
          name: generated-documentation
          path: ${{ env.GENERATED_DOCUMENTATION_DIRECTORY }}

      - name: Debug downloaded generated documentation
        run: |
          set -Eeuo pipefail

          echo "===== deploy job context ====="
          echo "repository:        ${{ github.repository }}"
          echo "event_name:        ${{ github.event_name }}"
          echo "workflow ref:      ${{ github.ref }}"
          echo "workflow ref name: ${{ github.ref_name }}"
          echo "workflow ref type: ${{ github.ref_type }}"
          echo "workflow sha:      ${{ github.sha }}"
          echo "package name:      ${PACKAGE_NAME}"
          echo "tag:               ${tag}"
          echo

          echo "===== downloaded generated documentation ====="
          echo "directory:"
          echo "${GENERATED_DOCUMENTATION_DIRECTORY}"
          echo

          test -d "${GENERATED_DOCUMENTATION_DIRECTORY}"
          test -f "${GENERATED_DOCUMENTATION_DIRECTORY}/index.html"

          echo "top-level directories:"
          find "${GENERATED_DOCUMENTATION_DIRECTORY}" \
            -mindepth 1 \
            -maxdepth 1 \
            -type d \
            -printf "%f\n" \
            | sort || true
          echo

          echo "top-level files:"
          find "${GENERATED_DOCUMENTATION_DIRECTORY}" \
            -maxdepth 1 \
            -type f \
            -printf "%f\n" \
            | sort || true
          echo

          echo "html file count:"
          find "${GENERATED_DOCUMENTATION_DIRECTORY}" -type f -name "*.html" | wc -l
          echo

          echo "all file count:"
          find "${GENERATED_DOCUMENTATION_DIRECTORY}" -type f | wc -l
          echo

          echo "directory size:"
          du -sh "${GENERATED_DOCUMENTATION_DIRECTORY}"
          echo

          echo "index.html files:"
          find "${GENERATED_DOCUMENTATION_DIRECTORY}" \
            -type f \
            -name "index.html" \
            | sort || true

      - name: Checkout documentation branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.DOCUMENTATION_BRANCH }}

      - name: Debug documentation branch before update
        run: |
          set -Eeuo pipefail

          echo "===== documentation branch checkout ====="
          echo "pwd: $(pwd)"
          echo

          echo "current branch:"
          git branch --show-current || true
          echo

          echo "current commit:"
          git log -1 --decorate=full --oneline
          echo

          echo "remote branches:"
          git branch --all --verbose --no-abbrev
          echo

          echo "current status:"
          git status --short
          echo

          echo "top-level files:"
          find . -maxdepth 2 -type f | sort | sed 's|^\./||' | head -160 || true
          echo

          echo "existing docs directories:"
          if [ -d docs ]; then
            find docs \
              -mindepth 1 \
              -maxdepth 1 \
              -type d \
              -printf "%f\n" \
              | sort -V || true
          else
            echo "No docs directory exists yet."
          fi
          echo

          echo "expected version directory:"
          echo "docs/${tag}"
          echo

          echo "does expected version directory already exist?"
          if [ -d "docs/${tag}" ]; then
            echo "yes"
            echo "file count:"
            find "docs/${tag}" -type f | wc -l
            echo "html count:"
            find "docs/${tag}" -type f -name "*.html" | wc -l
            echo "size:"
            du -sh "docs/${tag}"
          else
            echo "no"
          fi
          echo

          echo "does latest directory already exist?"
          if [ -d docs/latest ]; then
            echo "yes"
            echo "file count:"
            find docs/latest -type f | wc -l
            echo "html count:"
            find docs/latest -type f -name "*.html" | wc -l
            echo "size:"
            du -sh docs/latest
          else
            echo "no"
          fi
          echo

          echo "existing docs index.html files:"
          if [ -d docs ]; then
            find docs \
              -type f \
              -name "index.html" \
              | sort \
              | head -240 || true
          else
            echo "No docs directory exists yet."
          fi

      - name: Set up Git user
        run: |
          set -Eeuo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "===== git identity ====="
          git config user.name
          git config user.email

      - name: Download and render landing page template
        run: |
          set -Eeuo pipefail

          echo "===== downloading landing page template ====="
          curl -fL \
            -o template_index.html \
            https://raw.githubusercontent.com/MartinPdeS/MPSActions/refs/heads/master/asset/template_index.html

          echo "===== template preview before rendering ====="
          sed -n '1,100p' template_index.html
          echo

          sed "s|<package>|${PACKAGE_NAME}|g" template_index.html > index.html
          rm -f template_index.html

          echo "===== rendered landing page preview ====="
          sed -n '1,100p' index.html
          echo

          test -f index.html

      - name: Update versioned documentation folders
        run: |
          set -Eeuo pipefail

          test -d "${GENERATED_DOCUMENTATION_DIRECTORY}"
          test -f "${GENERATED_DOCUMENTATION_DIRECTORY}/index.html"

          mkdir -p docs

          echo "===== before replacement ====="
          echo "version tag: ${tag}"
          echo

          if [ -d "docs/${tag}" ]; then
            echo "Existing docs/${tag} sample:"
            find "docs/${tag}" -maxdepth 4 -type f | sort | head -240 || true
            du -sh "docs/${tag}"
          else
            echo "docs/${tag} does not exist yet."
          fi
          echo

          if [ -d docs/latest ]; then
            echo "Existing docs/latest sample:"
            find docs/latest -maxdepth 4 -type f | sort | head -240 || true
            du -sh docs/latest
          else
            echo "docs/latest does not exist yet."
          fi
          echo

          echo "===== removing old target folders ====="
          rm -rf "docs/${tag}"
          rm -rf docs/latest

          echo "===== copying complete generated HTML documentation ====="
          cp -a "${GENERATED_DOCUMENTATION_DIRECTORY}" "docs/${tag}"
          cp -a "docs/${tag}" docs/latest

          echo "===== after replacement ====="
          test -f "docs/${tag}/index.html"
          test -f docs/latest/index.html

          echo "docs/${tag} file count:"
          find "docs/${tag}" -type f | wc -l
          echo

          echo "docs/latest file count:"
          find docs/latest -type f | wc -l
          echo

          echo "docs/${tag} html count:"
          find "docs/${tag}" -type f -name "*.html" | wc -l
          echo

          echo "docs/latest html count:"
          find docs/latest -type f -name "*.html" | wc -l
          echo

          echo "docs/${tag} size:"
          du -sh "docs/${tag}"
          echo

          echo "docs/latest size:"
          du -sh docs/latest
          echo

          echo "versioned index checksum:"
          sha256sum "docs/${tag}/index.html"
          echo

          echo "latest index checksum:"
          sha256sum docs/latest/index.html
          echo

          echo "versioned top-level directories:"
          find "docs/${tag}" \
            -mindepth 1 \
            -maxdepth 1 \
            -type d \
            -printf "%f\n" \
            | sort || true
          echo

          echo "latest top-level directories:"
          find docs/latest \
            -mindepth 1 \
            -maxdepth 1 \
            -type d \
            -printf "%f\n" \
            | sort || true
          echo

          echo "versioned index.html files:"
          find "docs/${tag}" \
            -type f \
            -name "index.html" \
            | sort || true
          echo

          echo "latest index.html files:"
          find docs/latest \
            -type f \
            -name "index.html" \
            | sort || true
          echo

          echo "===== git status immediately after folder replacement ====="
          git status --short

      - name: Verify copied documentation folders
        run: |
          set -Eeuo pipefail

          echo "===== generic documentation verification ====="

          test -d "docs/${tag}"
          test -d docs/latest
          test -f "docs/${tag}/index.html"
          test -f docs/latest/index.html

          versioned_html_count="$(find "docs/${tag}" -type f -name "*.html" | wc -l | tr -d ' ')"
          latest_html_count="$(find docs/latest -type f -name "*.html" | wc -l | tr -d ' ')"

          echo "versioned_html_count=${versioned_html_count}"
          echo "latest_html_count=${latest_html_count}"

          if [ "${versioned_html_count}" -eq 0 ]; then
            echo "No HTML files were copied into docs/${tag}."
            exit 1
          fi

          if [ "${latest_html_count}" -eq 0 ]; then
            echo "No HTML files were copied into docs/latest."
            exit 1
          fi

          echo
          echo "===== versioned documentation directory tree, shallow ====="
          find "docs/${tag}" \
            -maxdepth 3 \
            -print \
            | sort \
            | head -240 || true

          echo
          echo "===== latest documentation directory tree, shallow ====="
          find docs/latest \
            -maxdepth 3 \
            -print \
            | sort \
            | head -240 || true

          echo
          echo "Documentation folders were copied correctly."

      - name: Rebuild version_switcher.json
        run: |
          set -Eeuo pipefail

          json_file="version_switcher.json"
          docs_path="docs"
          base_url="https://martinpdes.github.io/${PACKAGE_NAME}"

          rm -f "${json_file}"

          echo "[" > "${json_file}"

          first_entry=true

          if [ -d "${docs_path}/latest" ]; then
            latest_url="${base_url}/${docs_path}/latest"

            jq -n \
              --arg name "latest" \
              --arg version "latest" \
              --arg url "${latest_url}" \
              '{name: $name, version: $version, url: $url}' >> "${json_file}"

            first_entry=false
          fi

          version_dirs="$(
            find "${docs_path}" \
              -mindepth 1 \
              -maxdepth 1 \
              -type d \
              -printf "%f\n" \
              | grep -v "^latest$" \
              | sort -V -r
          )"

          for version in ${version_dirs}; do
            version_url="${base_url}/${docs_path}/${version}"

            if [ "${first_entry}" = false ]; then
              echo "," >> "${json_file}"
            fi

            jq -n \
              --arg name "${version}" \
              --arg version "${version}" \
              --arg url "${version_url}" \
              '{name: $name, version: $version, url: $url}' >> "${json_file}"

            first_entry=false
          done

          echo "]" >> "${json_file}"

          echo "===== generated version_switcher.json ====="
          cat "${json_file}"
          echo

          echo "===== validate version_switcher.json ====="
          jq . "${json_file}"
          echo

          echo "===== versions listed in docs/ ====="
          find docs \
            -mindepth 1 \
            -maxdepth 1 \
            -type d \
            -printf "%f\n" \
            | sort -V || true

      - name: Verify documentation tree
        run: |
          set -Eeuo pipefail

          echo "===== detected tag ====="
          echo "${tag}"
          echo

          echo "===== expected root files ====="
          test -f index.html
          test -f version_switcher.json
          test -f "docs/${tag}/index.html"
          test -f docs/latest/index.html
          echo "All expected root files exist."
          echo

          echo "===== all docs index files ====="
          find docs -name index.html | sort || true
          echo

          echo "===== versioned docs html files, sample ====="
          find "docs/${tag}" -type f -name "*.html" | sort | head -240 || true
          echo

          echo "===== latest docs html files, sample ====="
          find docs/latest -type f -name "*.html" | sort | head -240 || true
          echo

          echo "===== versioned docs html count ====="
          find "docs/${tag}" -type f -name "*.html" | wc -l
          echo

          echo "===== latest docs html count ====="
          find docs/latest -type f -name "*.html" | wc -l
          echo

          echo "===== versioned docs size ====="
          du -sh "docs/${tag}"
          echo

          echo "===== latest docs size ====="
          du -sh docs/latest
          echo

          echo "===== possible unwanted Sphinx build internals ====="
          find docs -path "*/.doctrees/*" -print | head -40 || true
          echo

          echo "===== gitignore diagnostics ====="
          if [ -f .gitignore ]; then
            cat .gitignore
            echo
            echo "check ignore rules for versioned index:"
            git check-ignore -v "docs/${tag}/index.html" || true
            echo
            echo "ignored files under versioned docs:"
            git status --ignored --short -- "docs/${tag}" | head -80 || true
          else
            echo "No .gitignore found on documentation branch."
          fi
          echo

          echo "===== git status before staging ====="
          git status --short

      - name: Commit and push documentation branch
        run: |
          set -Eeuo pipefail

          echo "===== staging documentation files ====="
          git add index.html
          git add version_switcher.json

          if [ -f .nojekyll ]; then
            git add .nojekyll
          fi

          git add -f "docs/${tag}"
          git add -f docs/latest

          echo
          echo "===== staged files summary ====="
          git status --short
          echo

          echo "===== staged file count ====="
          git diff --cached --name-only | wc -l
          echo

          echo "===== staged files under docs/${tag} ====="
          git diff --cached --name-status -- "docs/${tag}" || true
          echo

          echo "===== staged files under docs/latest ====="
          git diff --cached --name-status -- docs/latest || true
          echo

          echo "===== staged files outside copied docs folders ====="
          git diff --cached --name-status -- . ":(exclude)docs/${tag}" ":(exclude)docs/latest" || true
          echo

          echo "===== staged diff stat ====="
          git diff --cached --stat
          echo

          if git diff --cached --quiet; then
            echo "No documentation changes to commit."
          else
            git commit -m "Update documentation for ${tag} [skip ci]"

            echo
            echo "===== commit created ====="
            git log -1 --decorate=full --stat
            echo

            echo "===== syncing with remote documentation branch ====="
            git pull --rebase origin "${DOCUMENTATION_BRANCH}"

            echo
            echo "===== pushing documentation branch ====="
            git push origin "HEAD:${DOCUMENTATION_BRANCH}"
          fi

      - name: Debug documentation branch after push
        run: |
          set -Eeuo pipefail

          echo "===== final local commit ====="
          git log -1 --decorate=full --oneline
          echo

          echo "===== final local status ====="
          git status --short
          echo

          echo "===== remote documentation branch head ====="
          git ls-remote origin "refs/heads/${DOCUMENTATION_BRANCH}"
          echo

          echo "===== final docs directories ====="
          find docs \
            -mindepth 1 \
            -maxdepth 1 \
            -type d \
            -printf "%f\n" \
            | sort -V || true
          echo

          echo "===== final expected version directory ====="
          test -f "docs/${tag}/index.html"
          find "docs/${tag}" -maxdepth 3 -type f | sort | head -160 || true
          echo

          echo "===== final latest directory ====="
          test -f docs/latest/index.html
          find docs/latest -maxdepth 3 -type f | sort | head -160 || true

      - name: Prepare Pages payload
        run: |
          set -Eeuo pipefail

          rm -rf "${PAGES_SITE_DIRECTORY}"
          mkdir -p "${PAGES_SITE_DIRECTORY}"

          cp index.html "${PAGES_SITE_DIRECTORY}/"
          cp version_switcher.json "${PAGES_SITE_DIRECTORY}/"

          if [ -f .nojekyll ]; then
            cp .nojekyll "${PAGES_SITE_DIRECTORY}/"
          else
            touch "${PAGES_SITE_DIRECTORY}/.nojekyll"
          fi

          cp -a docs "${PAGES_SITE_DIRECTORY}/"

          echo "===== Pages payload verification ====="
          test -f "${PAGES_SITE_DIRECTORY}/index.html"
          test -f "${PAGES_SITE_DIRECTORY}/version_switcher.json"
          test -f "${PAGES_SITE_DIRECTORY}/.nojekyll"
          test -f "${PAGES_SITE_DIRECTORY}/docs/${tag}/index.html"
          test -f "${PAGES_SITE_DIRECTORY}/docs/latest/index.html"

          payload_versioned_html_count="$(find "${PAGES_SITE_DIRECTORY}/docs/${tag}" -type f -name "*.html" | wc -l | tr -d ' ')"
          payload_latest_html_count="$(find "${PAGES_SITE_DIRECTORY}/docs/latest" -type f -name "*.html" | wc -l | tr -d ' ')"

          echo "payload_versioned_html_count=${payload_versioned_html_count}"
          echo "payload_latest_html_count=${payload_latest_html_count}"

          if [ "${payload_versioned_html_count}" -eq 0 ]; then
            echo "No HTML files found in payload versioned docs."
            exit 1
          fi

          if [ "${payload_latest_html_count}" -eq 0 ]; then
            echo "No HTML files found in payload latest docs."
            exit 1
          fi

          echo
          echo "payload directory:"
          echo "${PAGES_SITE_DIRECTORY}"
          echo

          echo "payload size:"
          du -sh "${PAGES_SITE_DIRECTORY}"
          echo

          echo "payload file count:"
          find "${PAGES_SITE_DIRECTORY}" -type f | wc -l
          echo

          echo "payload html count:"
          find "${PAGES_SITE_DIRECTORY}" -type f -name "*.html" | wc -l

      - name: Debug Pages payload
        run: |
          set -Eeuo pipefail

          echo "===== payload version_switcher.json ====="
          cat "${PAGES_SITE_DIRECTORY}/version_switcher.json"
          echo

          echo "===== payload index files ====="
          find "${PAGES_SITE_DIRECTORY}" -name index.html | sort || true
          echo

          echo "===== payload docs directories ====="
          find "${PAGES_SITE_DIRECTORY}/docs" \
            -mindepth 1 \
            -maxdepth 1 \
            -type d \
            -printf "%f\n" \
            | sort -V || true
          echo

          echo "===== payload expected version sample ====="
          find "${PAGES_SITE_DIRECTORY}/docs/${tag}" \
            -maxdepth 4 \
            -type f \
            | sort \
            | head -240 || true
          echo

          echo "===== payload latest sample ====="
          find "${PAGES_SITE_DIRECTORY}/docs/latest" \
            -maxdepth 4 \
            -type f \
            | sort \
            | head -240 || true

      - name: Set up GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ env.PAGES_SITE_DIRECTORY }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Probe live site after deploy
        run: |
          set -Eeuo pipefail

          base_url="https://martinpdes.github.io/${PACKAGE_NAME}"

          echo "===== deployment output ====="
          echo "page_url=${{ steps.deployment.outputs.page_url }}"
          echo "base_url=${base_url}"
          echo "tag=${tag}"
          echo

          echo "Waiting briefly before probing live GitHub Pages..."
          sleep 20

          echo
          echo "===== live version_switcher.json ====="
          curl -fL "${base_url}/version_switcher.json" || true
          echo

          echo
          echo "===== live root ====="
          curl -IL "${base_url}/" || true
          echo

          echo
          echo "===== live latest ====="
          curl -IL "${base_url}/docs/latest/" || true
          echo

          echo
          echo "===== live latest index ====="
          curl -IL "${base_url}/docs/latest/index.html" || true
          echo

          echo
          echo "===== live tag ====="
          curl -IL "${base_url}/docs/${tag}/" || true
          echo

          echo
          echo "===== live tag index ====="
          curl -IL "${base_url}/docs/${tag}/index.html" || true

      - name: Print deployment URL
        run: |
          set -Eeuo pipefail

          echo "page_url=${{ steps.deployment.outputs.page_url }}"
