name: Build and Upload Package Documentation on GitHub Pages

on:
  workflow_call:
    inputs:
      python-version:
        required: true
        type: string
      package-name:
        required: true
        type: string
      apt-package:
        required: false
        type: string

concurrency:
  group: documentation-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy_documentation:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
          ref: master

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install headless dependencies
        run: |
          sudo apt-get update
          if [ -n "${{ inputs.apt-package }}" ]; then
            sudo apt-get install -y ${{ inputs.apt-package }}
          fi

      - name: Build package and install documentation dependencies
        run: |
          python -m pip install --upgrade pip wheel build
          python -m build --wheel
          python -m pip install .[documentation]

      - name: Get current tag
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0.0")
          echo "tag=$TAG" >> "$GITHUB_ENV"
          echo "Tag found or default: $TAG"

      - name: Build Sphinx documentation
        run: |
          rm -rf /tmp/documentation_build
          sphinx-build --verbose -b html docs/source /tmp/documentation_build
          test -f /tmp/documentation_build/index.html

      - name: Checkout documentation branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: documentation_page

      - name: Set up Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Download and render landing page template
        run: |
          curl -L -o template_index.html https://raw.githubusercontent.com/MartinPdeS/MPSActions/refs/heads/master/asset/template_index.html
          sed "s|<package>|${{ inputs.package-name }}|g" template_index.html > index.html
          rm -f template_index.html

      - name: Update versioned documentation
        run: |
          mkdir -p docs

          rm -rf "docs/${{ env.tag }}"
          rm -rf docs/latest

          cp -r /tmp/documentation_build "docs/${{ env.tag }}"
          cp -r "docs/${{ env.tag }}" docs/latest

          test -f "docs/${{ env.tag }}/index.html"
          test -f "docs/latest/index.html"

      - name: Rebuild version_switcher.json
        run: |
          json_file="version_switcher.json"
          docs_path="docs"
          base_url="https://martinpdes.github.io/${{ inputs.package-name }}"

          rm -f "$json_file"
          echo "[" > "$json_file"

          first_entry=true

          if [ -d "$docs_path/latest" ]; then
            latest_url="${base_url}/${docs_path}/latest"
            jq -n \
              --arg name "latest" \
              --arg version "latest" \
              --arg url "$latest_url" \
              '{name: $name, version: $version, url: $url}' >> "$json_file"
            first_entry=false
          fi

          version_dirs=$(find "$docs_path" -mindepth 1 -maxdepth 1 -type d -printf "%f\n" | grep -v "^latest$" | sort -V -r)

          for version in $version_dirs; do
            version_url="${base_url}/${docs_path}/${version}"

            if [ "$first_entry" = false ]; then
              echo "," >> "$json_file"
            fi

            jq -n \
              --arg name "$version" \
              --arg version "$version" \
              --arg url "$version_url" \
              '{name: $name, version: $version, url: $url}' >> "$json_file"

            first_entry=false
          done

          echo "]" >> "$json_file"

      - name: Verify documentation tree
        run: |
          echo "===== tag ====="
          echo "${{ env.tag }}"
          echo
          echo "===== docs index files ====="
          find docs -maxdepth 3 -name index.html | sort
          echo
          test -f index.html
          test -f version_switcher.json
          test -f "docs/${{ env.tag }}/index.html"
          test -f docs/latest/index.html

      - name: Commit and push documentation branch
        run: |
          git add index.html
          git add version_switcher.json
          git add docs/

          echo "===== staged files ====="
          git status --short
          echo

          if git diff --cached --quiet; then
            echo "No documentation changes to commit."
          else
            git commit -m "Update documentation for ${{ env.tag }} [skip ci]"
            git pull --rebase origin documentation_page
            git push origin HEAD:documentation_page
          fi

      - name: Prepare Pages payload
        run: |
          rm -rf /tmp/pages_site
          mkdir -p /tmp/pages_site

          cp index.html /tmp/pages_site/
          cp version_switcher.json /tmp/pages_site/

          if [ -f .nojekyll ]; then
            cp .nojekyll /tmp/pages_site/
          else
            touch /tmp/pages_site/.nojekyll
          fi

          cp -r docs /tmp/pages_site/

          test -f /tmp/pages_site/index.html
          test -f /tmp/pages_site/version_switcher.json
          test -f /tmp/pages_site/.nojekyll
          test -f "/tmp/pages_site/docs/${{ env.tag }}/index.html"
          test -f /tmp/pages_site/docs/latest/index.html

      - name: Debug Pages payload
        run: |
          echo "===== payload version_switcher.json ====="
          cat /tmp/pages_site/version_switcher.json
          echo
          echo "===== payload index files ====="
          find /tmp/pages_site -maxdepth 4 -name index.html | sort
          echo
          echo "===== payload files ====="
          find /tmp/pages_site -maxdepth 3 -type f | sort

      - name: Set up GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: /tmp/pages_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Probe live site after deploy
        run: |
          sleep 20
          echo "===== live version_switcher.json ====="
          curl -L https://martinpdes.github.io/${{ inputs.package-name }}/version_switcher.json || true
          echo
          echo "===== live latest ====="
          curl -I https://martinpdes.github.io/${{ inputs.package-name }}/docs/latest/ || true
          echo
          echo "===== live tag ====="
          curl -I https://martinpdes.github.io/${{ inputs.package-name }}/docs/${{ env.tag }}/ || true
          echo
          echo "===== live tag index ====="
          curl -I https://martinpdes.github.io/${{ inputs.package-name }}/docs/${{ env.tag }}/index.html || true

      - name: Print deployment URL
        run: |
          echo "page_url=${{ steps.deployment.outputs.page_url }}"
