name: Build and Upload Conda Package

on:
  workflow_call:
    inputs:
      python_versions:
        description: "JSON list of Python versions"
        required: true
        type: string

      os_list:
        description: "JSON list of OS runners such as ['ubuntu-latest','macos-latest']"
        required: true
        type: string

      apt_package:
        required: false
        type: string
        default: ""

      brew_package:
        required: false
        type: string
        default: ""

    secrets:
      ANACONDA_API_TOKEN:
        required: true

defaults:
  run:
    shell: bash -l {0}

jobs:

  conda_deployment:
    name: Build on ${{ matrix.os }} Python ${{ matrix.python }}

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(inputs.os_list) }}
        python: ${{ fromJson(inputs.python_versions) }}

    env:
      PYTHON_VERSION: ${{ matrix.python }}
      ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}

    steps:

      # -------------------------------------------------------------
      # Checkout
      # -------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      # -------------------------------------------------------------
      # Debug system data
      # -------------------------------------------------------------
      - name: Debug system information
        run: |
          echo "Runner OS: $RUNNER_OS"
          echo "Matrix OS: ${{ matrix.os }}"
          echo "Matrix Python: ${{ matrix.python }}"
          echo "GitHub ref: $GITHUB_REF"
          echo "GitHub event: $GITHUB_EVENT_NAME"
          echo "Workspace: $GITHUB_WORKSPACE"
          echo "Conda path before setup: ${CONDA:-not-set}"

          uname -a || true
          git --version
          git status --short
          git describe --tags --always --dirty || true

          echo ""
          echo "Environment variables:"
          env | sort

      # -------------------------------------------------------------
      # Install system packages
      # -------------------------------------------------------------
      - name: Install APT package
        if: runner.os == 'Linux' && inputs.apt_package != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ inputs.apt_package }}

      - name: Install Homebrew package
        if: runner.os == 'macOS' && inputs.brew_package != ''
        run: |
          brew update
          brew install ${{ inputs.brew_package }}

      # -------------------------------------------------------------
      # Set up Conda
      #
      # Use Miniforge instead of Miniconda latest.
      # This avoids the current Miniconda latest installer/bootstrap issue.
      # -------------------------------------------------------------
      - name: Install Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: "latest"
          auto-update-conda: false
          auto-activate-base: true
          activate-environment: base
          python-version: ${{ matrix.python }}
          channels: conda-forge,martinpdes
          channel-priority: flexible
          show-channel-urls: true

      # -------------------------------------------------------------
      # Debug Conda state before installing tools
      # -------------------------------------------------------------
      - name: Debug Conda before tool installation
        run: |
          echo "CONDA=$CONDA"
          echo "CONDA_PREFIX=$CONDA_PREFIX"
          echo "CONDA_DEFAULT_ENV=$CONDA_DEFAULT_ENV"
          echo "CONDA_NO_PLUGINS=${CONDA_NO_PLUGINS:-not-set}"

          which conda
          conda --version
          conda info
          conda config --show-sources
          conda config --show
          conda list

          echo ""
          echo "Search conda-build:"
          conda search conda-build --info || true

          echo ""
          echo "Search anaconda-client:"
          conda search anaconda-client --info || true

      # -------------------------------------------------------------
      # Install conda build tools
      #
      # CONDA_NO_PLUGINS is scoped only to this step.
      # Do not set it globally before setup-miniconda.
      # -------------------------------------------------------------
      - name: Install conda build tools
        run: |
          conda install -n base -y -c conda-forge conda-build anaconda-client

      # -------------------------------------------------------------
      # Debug Conda state after installing tools
      # -------------------------------------------------------------
      - name: Debug Conda after tool installation
        run: |
          echo "CONDA=$CONDA"
          echo "CONDA_PREFIX=$CONDA_PREFIX"
          echo "CONDA_DEFAULT_ENV=$CONDA_DEFAULT_ENV"

          which conda
          which conda-build
          which anaconda

          conda --version
          conda-build --version
          anaconda --version

          conda list conda
          conda list conda-build
          conda list anaconda-client
          conda info

      # -------------------------------------------------------------
      # Debug recipe metadata
      # -------------------------------------------------------------
      - name: Debug recipe metadata
        env:
          CONDA_NO_PLUGINS: "true"
        run: |
          echo "Repository files:"
          ls -la

          echo ""
          echo "meta.yaml:"
          if [ -f meta.yaml ]; then
            sed -n '1,260p' meta.yaml
          else
            echo "No meta.yaml found at repository root."
          fi

          echo ""
          echo "conda_build_config.yaml:"
          if [ -f conda_build_config.yaml ]; then
            sed -n '1,260p' conda_build_config.yaml
          else
            echo "No conda_build_config.yaml found."
          fi

          echo ""
          echo "pyproject.toml:"
          if [ -f pyproject.toml ]; then
            sed -n '1,260p' pyproject.toml
          else
            echo "No pyproject.toml found."
          fi

      # -------------------------------------------------------------
      # Debug expected package path
      # -------------------------------------------------------------
      - name: Debug expected conda build output
        env:
          CONDA_NO_PLUGINS: "true"
        run: |
          conda-build . \
            --python "${PYTHON_VERSION}" \
            -c martinpdes \
            -c conda-forge \
            --output

      # -------------------------------------------------------------
      # Configure upload behavior
      # -------------------------------------------------------------
      - name: Configure conda upload
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "push" && "$GITHUB_REF" == refs/tags/* ]]; then
            echo "This is a tag push. Package upload is enabled."
            conda config --set anaconda_upload true
          else
            echo "This is not a tag push. Package upload is disabled."
            conda config --set anaconda_upload false
          fi

          conda config --show anaconda_upload

      # -------------------------------------------------------------
      # Build package
      # -------------------------------------------------------------
      - name: Build conda package
        env:
          CONDA_NO_PLUGINS: "true"
        run: |
          echo "Building conda package for Python ${PYTHON_VERSION}"

          mkdir -p conda-build-artifacts

          conda-build . \
            --python "${PYTHON_VERSION}" \
            -c martinpdes \
            -c conda-forge \
            --output-folder conda-build-artifacts

      # -------------------------------------------------------------
      # Debug build output
      # -------------------------------------------------------------
      - name: Debug build artifacts
        if: always()
        run: |
          echo "Build artifacts:"
          find conda-build-artifacts -maxdepth 6 -type f -print || true

          echo ""
          echo "Conda build cache information:"
          conda-build purge --help >/dev/null 2>&1 || true

      # -------------------------------------------------------------
      # Upload package only on tags
      # -------------------------------------------------------------
      - name: Upload conda package to Anaconda
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          echo "Uploading conda packages to Anaconda."

          shopt -s globstar nullglob

          packages=(
            conda-build-artifacts/**/*.conda
            conda-build-artifacts/**/*.tar.bz2
          )

          if [ ${#packages[@]} -eq 0 ]; then
            echo "No conda packages found to upload."
            exit 1
          fi

          anaconda \
            --token "$ANACONDA_API_TOKEN" \
            upload \
            --user martinpdes \
            --force \
            "${packages[@]}"

      # -------------------------------------------------------------
      # Store package as GitHub Actions artifact
      # -------------------------------------------------------------
      - name: Upload package as GitHub Actions artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conda-package-${{ matrix.os }}-py${{ matrix.python }}
          path: |
            conda-build-artifacts/**/*.conda
            conda-build-artifacts/**/*.tar.bz2
          if-no-files-found: warn
